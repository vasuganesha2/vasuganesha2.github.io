<h1>Combinatorics</h1>

<h2>Basic Formula</h2>

<p>
\( \binom{n}{r} = \frac{n!}{r!(n-r)!} \)
</p>

<h2>Inclusion-Exclusion</h2>

<p>
\[
|A \cup B| = |A| + |B| - |A \cap B|
\]
</p>

<h2>At least k sets</h2>

<p>
\[
\sum_{j=k}^{n} (-1)^{j-k} \binom{j-1}{k-1}
\sum_{|I|=j} \left|\bigcap_{i\in I} A_i\right|
\]
</p>
