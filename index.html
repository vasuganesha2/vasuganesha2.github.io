<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Formula Sheet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --card: #f4f4f4;
      --accent: #4f46e5;
    }

    body.dark {
      --bg: #0f172a;
      --text: #e5e7eb;
      --card: #1e293b;
      --accent: #818cf8;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 30px;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .sections {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: var(--accent);
      color: white;
    }

    .toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card);
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">🌙 Toggle</button>

<div class="container">
  <h1>📘 Math Formula Sheet</h1>
  <p>Quick revision for CP & exams</p>

  <h2>Sections</h2>

  <div class="sections">
    <a class="card" href="combinatorics.html">Combinatorics</a>
    <a class="card" href="number_theory.html">Number Theory</a>
    <a class="card" href="probability.html">Probability</a>
    <a class="card" href="algebra.html">Algebra</a>
  </div>
</div>

<script>
  function toggleMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
      document.body.classList.contains("dark") ? "dark" : "light"
    );
  }

  // Load saved theme
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }
</script>

</body>
</html>
