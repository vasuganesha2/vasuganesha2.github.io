<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vasu Ganesha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0b0f1a;
      --card: #111827;
      --border: #1e2d45;
      --accent: #c9a84c;
      --text: #e2d9c8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 40px;
      color: var(--accent);
    }

    .links {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 30px 50px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 1.3rem;
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📚 Vasu Ganesha</h1>

    <div class="links">
      <!-- Both point to math page -->
      <a class="card" href="math.html">Math</a>
      <a class="card" href="math.html">Algorithm</a>
    </div>
  </div>

</body>
</html>
