<h1>📘 My Math Formula Sheet</h1>

<h2>Combinatorics</h2>

<div class="formula">
  \( \binom{n}{r} = \frac{n!}{r!(n-r)!} \)
</div>

<div class="formula">
  Inclusion-Exclusion:
  \[
  \left|\bigcup A_i\right| =
  \sum |A_i| - \sum |A_i \cap A_j| + \cdots
  \]
</div>

<div class="formula">
  At least k sets:
  \[
  \sum_{j=k}^{n} (-1)^{j-k} \binom{j-1}{k-1}
  \sum_{|I|=j} \left|\bigcap_{i\in I} A_i\right|
  \]
</div>
